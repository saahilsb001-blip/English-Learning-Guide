        :root {
            /* Advanced Custom Easings - Slower, more fluid, and graceful */
            --spring-bounce: cubic-bezier(0.2, 1.1, 0.3, 1);
            --spring-smooth: cubic-bezier(0.22, 1, 0.36, 1);
            --ios-nav: cubic-bezier(0.25, 1, 0.3, 1);
            
            --bg-deep: #02000a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            position: relative;
        }

        h1, h2, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* Fluid Animated Background - Reacts to scroll */
        .aurora-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(-45deg, #02000a, #0f0518, #070b19, #13051a);
            background-size: 300% 300%;
            animation: gradient-shift 18s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(99, 102, 241, 0.6); filter: blur(70px); }
        .blob-2 { top: 40%; right: -20%; width: 60vw; height: 60vw; background: rgba(168, 85, 247, 0.5); filter: blur(90px); }
        .blob-3 { bottom: -20%; left: 20%; width: 70vw; height: 70vw; background: rgba(56, 189, 248, 0.4); filter: blur(80px); }

        #app-container {
            position: relative;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* View Routing Architecture */
        .view-section {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            min-height: 100vh;
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: translateX(100%); 
            transition: transform 0.8s var(--ios-nav), opacity 0.8s var(--ios-nav);
            will-change: transform, opacity;
        }

        .view-section.active {
            visibility: visible;
            pointer-events: auto;
            opacity: 1;
            transform: translateX(0);
            position: relative; /* Allows page to dictate scroll height */
        }

        .view-section.slide-left-out {
            transform: translateX(-30%) scale(0.95);
            opacity: 0;
            position: absolute;
        }
        
        .view-section.slide-right-out {
            transform: translateX(100%);
            opacity: 0;
            position: absolute;
        }

        /* Staggered Elastic List Items */
        .stagger-item {
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            will-change: transform, opacity;
        }

        .stagger-item.in-view {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.8s ease-out, transform 1.2s var(--spring-bounce);
        }

        /* Hyper-Glassmorphism Interactive Cards */
        .interactive-card {
            background: linear-gradient(180deg, rgba(15, 15, 25, 0.7) 0%, rgba(5, 5, 15, 0.8) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.7s var(--spring-bounce), border-color 0.5s ease, background 0.5s ease;
            will-change: transform;
            transform-origin: center center;
        }

        .interactive-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* State applied by JS touch events */
        .interactive-card.is-pressed {
            transform: scale(0.96) translateY(2px);
            border-color: rgba(255, 255, 255, 0.2);
            background: linear-gradient(180deg, rgba(25, 25, 40, 0.8) 0%, rgba(10, 10, 20, 0.9) 100%);
            transition: transform 0.4s var(--spring-smooth), border-color 0.4s ease, background 0.4s ease;
        }
        .interactive-card.is-pressed::after {
            opacity: 1;
        }

        /* Action Buttons */
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s var(--spring-bounce);
        }
        .interactive-card.is-pressed .action-btn {
            background: #fff;
            color: #000;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);

            background: rgba(255,255,255,0.15);

        /* Gradients */

        function initTouchInteractions() {
            let activeElement = null;
            let startY = 0;
            let isScrolling = false;

            document.querySelectorAll('.touch-target').forEach(el => {
                
                el.addEventListener('touchstart', (e) => {
                    activeElement = el;
                    startY = e.touches[0].clientY;
                    isScrolling = false;
                    setTimeout(() => {
                        if (activeElement === el && !isScrolling) {
                            el.classList.add('is-pressed');
                            if(navigator.vibrate) navigator.vibrate(15); 
                        }
                    }, 50);
                }, {passive: true});

                el.addEventListener('touchmove', (e) => {
                    if (Math.abs(e.touches[0].clientY - startY) > 10) {
                        isScrolling = true;
                        el.classList.remove('is-pressed');
                        activeElement = null;
                    }
                }, {passive: true});

                const endTouch = (e) => {
                    if (activeElement === el && !isScrolling) {
                        el.classList.remove('is-pressed');
                        if(navigator.vibrate) navigator.vibrate(25); 
                        
                        const actionDef = el.getAttribute('data-action');
                        if(actionDef) executeAction(actionDef);
                    }
                    activeElement = null;
                };

                el.addEventListener('touchend', endTouch);
                el.addEventListener('touchcancel', () => el.classList.remove('is-pressed'));
                
                // Fallback for mouse (Desktop testing)
                el.addEventListener('mousedown', (e) => {
                    activeElement = el;
                    isScrolling = false;
                    el.classList.add('is-pressed');
                });
                el.addEventListener('mouseup', endTouch);
                el.addEventListener('mouseleave', () => {
                    el.classList.remove('is-pressed');
                    activeElement = null;
                });
            });
        }

        /* ROUTING ENGINE */
        const routeHistory = ['view-home'];

        function executeAction(actionDef) {
            const splitIndex = actionDef.indexOf(':');
            const type = splitIndex > -1 ? actionDef.slice(0, splitIndex) : actionDef;
            const payload = splitIndex > -1 ? actionDef.slice(splitIndex + 1) : '';

            if (type === 'link') {
                window.location.href = payload;
            }
            if (type === 'route') {
                switchView(payload, 'forward');
            }
            if (type === 'back') {
                switchView(routeHistory[routeHistory.length - 2] || 'view-home', 'backward');
            }
            if (type === 'copy-prompt') {
                const promptIndex = parseInt(payload, 10);
                const promptText = promptsData[promptIndex].content;
                handlePrompt(promptText);
            }
        }

        function switchView(targetId, direction = 'forward') {
            const currentId = routeHistory[routeHistory.length - 1];
            if (currentId === targetId) return;

            const currentView = document.getElementById(currentId);
            const targetView = document.getElementById(targetId);

            if (direction === 'forward') {
                routeHistory.push(targetId);
                currentView.className = 'view-section slide-left-out';
                targetView.className = 'view-section active';
            } else {
                routeHistory.pop();
                currentView.className = 'view-section slide-right-out';
                targetView.className = 'view-section active';
                targetView.style.transform = 'scale(0.95) translateX(-30%)';
                targetView.style.opacity = '0';
                
                requestAnimationFrame(() => {
                    targetView.style.transform = '';
                    targetView.style.opacity = '1';
                });
            }

            window.scrollTo({ top: 0, behavior: 'instant' });
            triggerStaggerAnimation(targetView);
        }

        /* CASCADE ANIMATIONS */
        function triggerStaggerAnimation(viewElement = document) {
            const items = viewElement.querySelectorAll('.stagger-item');
            items.forEach(el => el.classList.remove('in-view'));
            
            items.forEach((el, i) => {
                setTimeout(() => {
                    el.classList.add('in-view');
                }, 100 + (i * 90)); 
            });
        }

        /* SCROLL PARALLAX AURORA */
        function initScrollParallax() {
            const blob1 = document.getElementById('blob1');
            const blob2 = document.getElementById('blob2');
            const blob3 = document.getElementById('blob3');
            
            window.addEventListener('scroll', () => {
                const scrolled = window.scrollY;
                blob1.style.transform = `translateY(${scrolled * -0.2}px) scale(${1 + scrolled*0.0005})`;
                blob2.style.transform = `translateY(${scrolled * -0.15}px) rotate(${scrolled * 0.05}deg)`;
                blob3.style.transform = `translateY(${scrolled * -0.25}px) scale(${1 - scrolled*0.0002})`;
            }, {passive: true});
        }

            clearTimeout(toastTimeout);
            toast.classList.remove("show");
            
            setTimeout(() => toast.classList.add("show"), 50);

            textArea.value = text;

            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);

            } finally {
