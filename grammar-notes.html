    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .snap-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            height: 100dvh;
        }

        .snap-item {
            scroll-snap-align: start;
            scroll-snap-stop: always;
            height: 100vh;
            height: 100dvh;
        }

        /* Instagram Gradient Ring */
        .story-ring {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 3px;
            border-radius: 50%;
        }

        /* Styled Tables for Reels */
        .reel-content table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
        }
        
        .reel-content th, .reel-content td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .reel-content th {
            background: rgba(255, 255, 255, 0.15);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .reel-content tr:last-child td {
            border-bottom: none;
        }
        .reel-content td:last-child, .reel-content th:last-child {
            border-right: none;
        }

        .reel-content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reel-content h3 {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .examples-box, .tips-box {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #6366f1;
            padding: 12px;
            border-radius: 4px 8px 8px 4px;
            font-size: 0.85rem;
            color: #e2e8f0;
            line-height: 1.5;
        }
        .tips-box {
            border-left-color: #f59e0b;
        }

        .examples-box p, .tips-box p {
            margin-bottom: 6px;
        }
        .examples-box p:last-child, .tips-box p:last-child {
            margin-bottom: 0;
        }

        /* SVG Icons */
        .icon {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .icon-fill {
            fill: currentColor;
        }

        /* Animation for liking */
        @keyframes heart-burst {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #ef4444; fill: #ef4444; }
            100% { transform: scale(1); color: #ef4444; fill: #ef4444; }
        }
        .liked svg {
            animation: heart-burst 0.3s ease-out forwards;
            color: #ef4444;
            fill: #ef4444;
        }
    </style>
</head>

                    </table>
                    <h3 class="mt-4">Continuous Tenses</h3>
                    <table>
                        <tr><th>Name</th><th>Formula</th><th>Hindi</th></tr>
                        <tr><td><b>Past</b></td><td>Was/Were + V4</td><td>रहा था</td></tr>
                        <tr><td><b>Present</b></td><td>Is/Am/Are + V4</td><td>रहा है</td></tr>
                        <tr><td><b>Future</b></td><td>Will be + V4</td><td>रहा होगा</td></tr>
                    </table>
                `
            },
            {
                title: "Perfect Tenses",
                category: "Tenses",
                color: "from-violet-900 to-slate-900",
                content: `
                    <h2>Tenses</h2>
                    <h3>Perfect Tenses</h3>
                    <table>
                        <tr><th>Name</th><th>Formula</th><th>Hindi</th></tr>
                        <tr><td><b>Past</b></td><td>Had + V3</td><td>चुका था</td></tr>
                        <tr><td><b>Present</b></td><td>Has/Have + V3</td><td>चुका है</td></tr>
                        <tr><td><b>Future</b></td><td>Will have + V3</td><td>चुका होगा</td></tr>
                    </table>
                    <h3 class="mt-4">Perfect Continuous</h3>
                    <table>
                        <tr><th>Name</th><th>Formula</th></tr>
                        <tr><td><b>Past</b></td><td>Had been + V4</td></tr>
                        <tr><td><b>Present</b></td><td>Has/Have been + V4</td></tr>
                        <tr><td><b>Future</b></td><td>Will have been + V4</td></tr>
                    </table>
                `
            },
            {
                title: "Active vs Passive",
                category: "Voice",
                color: "from-pink-900 to-slate-900",
                content: `
                    <h2>Active & Passive Voice</h2>
                    <h3>Identification Trick</h3>
                    <div class="tips-box mb-4">
                        <p>1. वाक्य में काम (Verb) ढूँढें।</p>
                        <p>2. पूछें: <b>"यह काम किसने किया?"</b></p>
                        <p>3. जवाब शुरू में है = <b>Active</b></p>
                        <p>4. जवाब आखिर में है = <b>Passive</b></p>
                    </div>
                    <table>
                        <tr><th>Voice</th><th>Sentence</th></tr>
                        <tr><td><b>Active</b></td><td><b>Rahul</b> broke the window.</td></tr>
                        <tr><td><b>Passive</b></td><td>The window was broken <b>by Rahul</b>.</td></tr>
                    </table>
                `
            },
            {
                title: "Passive Conversion",
                category: "Voice",
                color: "from-red-900 to-slate-900",
                content: `
                    <h2>Active & Passive Voice</h2>
                    <h3>Conversion Rules</h3>
                    <div class="tips-box mb-4">
                        <p>1. <b>Object</b> को Subject बनाएं।</p>
                        <p>2. नया <b>Helping Verb</b> लगाएं।</p>
                        <p>3. Verb को <b>V3</b> में बदलें। (Always V3!)</p>
                        <p>4. <b>By + Subject</b> आखिर में।</p>
                    </div>
                    <table>
                        <tr><th>Active</th><th>Passive</th></tr>
                        <tr><td>I eat an apple.</td><td>An apple <b>is eaten</b> by me.</td></tr>
                        <tr><td>I ate an apple.</td><td>An apple <b>was eaten</b> by me.</td></tr>
                    </table>
                `
            }
        ];

        // Render Grid
        const gridContainer = document.getElementById('profile-grid');
        const postCount = document.getElementById('post-count');
        postCount.innerText = reelsData.length;

        reelsData.forEach((reel, index) => {
            const gridItem = document.createElement('div');
            gridItem.className = `aspect-[3/4] bg-gradient-to-br ${reel.color} relative cursor-pointer flex flex-col justify-end p-2 border-[0.5px] border-black hover:opacity-90 transition-opacity`;
            gridItem.onclick = () => openReels(index);
            
            gridItem.innerHTML = `
                <div class="absolute top-2 right-2">
                    <svg class="w-4 h-4 text-white drop-shadow-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                </div>
                <div class="text-[10px] font-semibold text-white drop-shadow-md uppercase tracking-wider opacity-80">${reel.category}</div>
                <div class="text-xs font-bold text-white drop-shadow-md leading-tight mt-1 line-clamp-2">${reel.title}</div>
                <div class="flex items-center gap-1 mt-1 text-[10px] text-white opacity-80">
                    <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> 10K
                </div>
            `;
            gridContainer.appendChild(gridItem);
        });

        // Render Reels
        const reelsContainer = document.getElementById('reels-container');
        
        reelsData.forEach((reel, index) => {
            const reelElement = document.createElement('div');
            reelElement.className = `snap-item w-full relative bg-gradient-to-b ${reel.color} flex flex-col`;
            
            reelElement.innerHTML = `
                <!-- Content Area -->
                <div class="flex-1 flex flex-col justify-center px-4 pr-16 pt-12 pb-24 reel-content relative z-10">
                    ${reel.content}
                </div>

                <!-- Right Side Actions -->
                <div class="absolute right-2 bottom-28 flex flex-col items-center gap-5 z-20">
                    <button class="flex flex-col items-center gap-1 group like-btn" onclick="toggleLike(this)">
                        <svg class="icon transition-transform active:scale-75" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <span class="text-xs font-medium">10.5K</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 transition-transform active:scale-75">
                        <svg class="icon icon-fill" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        <span class="text-xs font-medium">402</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 transition-transform active:scale-75">
                        <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        <span class="text-xs font-medium">Share</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 transition-transform active:scale-75 mt-2">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                    </button>
                    
                    <!-- Audio Track Icon -->
                    <div class="w-8 h-8 rounded-lg bg-zinc-800 border-2 border-white mt-4 overflow-hidden animate-[spin_4s_linear_infinite] flex items-center justify-center">
                        <span class="text-xs">🎵</span>
                    </div>
                </div>

                <!-- Bottom User Info -->
                <div class="absolute bottom-4 left-4 right-16 z-20">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-600 flex items-center justify-center text-sm">👨‍🏫</div>
                        <span class="font-semibold text-sm drop-shadow-md">saahil_english</span>
                        <button class="border border-white px-2 py-0.5 rounded-md text-xs font-semibold ml-1 drop-shadow-md">Follow</button>
                    </div>
                    <p class="text-sm line-clamp-2 drop-shadow-md">Save this to master your grammar quickly! #english #grammar #${reel.category.toLowerCase()}</p>
                    
                    <!-- Scrolling Audio Text -->
                    <div class="flex items-center gap-2 mt-2 text-xs text-zinc-100 drop-shadow-md overflow-hidden">
                        <svg class="w-3 h-3 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                        <marquee scrollamount="3" class="w-40">saahil_english • Original Audio - Learn Grammar</marquee>
                    </div>
                </div>
                
                <!-- Dark gradient overlay at bottom for text readability -->
                <div class="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-black/80 to-transparent pointer-events-none z-0"></div>
            `;
            
            reelsContainer.appendChild(reelElement);
        });

        // Interactions
        function openReels(index) {
            document.getElementById('reels-modal').style.display = 'flex';
            // Wait for display to apply before scrolling
            setTimeout(() => {
                const targetReel = reelsContainer.children[index];
                if(targetReel) {
                    targetReel.scrollIntoView({ behavior: 'instant' });
                }
            }, 10);
        }

        function closeReels() {
            document.getElementById('reels-modal').style.display = 'none';
        }

        function toggleLike(btn) {
            btn.classList.toggle('liked');
            if(navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
